<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Chat Support</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 700px;
        }

        .setup-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            text-align: center;
        }

        .setup-screen h2 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #1e3c72;
        }

        .setup-screen p {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .setup-form {
            width: 100%;
        }

        .setup-form input {
            width: 100%;
            padding: 14px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
            font-family: monospace;
        }

        .setup-form input:focus {
            outline: none;
            border-color: #1e3c72;
            box-shadow: 0 0 0 3px rgba(30, 60, 114, 0.1);
        }

        .setup-form button {
            width: 100%;
            padding: 14px;
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .setup-form button:hover {
            background: #152a52;
        }

        .setup-form .error {
            color: #d32f2f;
            font-size: 12px;
            margin-top: 10px;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            border-radius: 12px 12px 0 0;
            text-align: center;
            display: none;
        }

        .header.active {
            display: block;
        }

        .header h1 {
            font-size: 22px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 13px;
            opacity: 0.9;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
            display: none;
        }

        .chat-area.active {
            display: block;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 14px;
        }

        .message.user .message-bubble {
            background: #1e3c72;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-bubble {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            display: none;
        }

        .input-area.active {
            display: flex;
        }

        .input-field {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            font-family: inherit;
        }

        .input-field:focus {
            outline: none;
            border-color: #1e3c72;
            box-shadow: 0 0 0 3px rgba(30, 60, 114, 0.1);
        }

        .send-btn {
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #152a52;
        }

        .send-btn:active {
            transform: scale(0.98);
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
            }
            30% {
                opacity: 1;
            }
        }

        .booking-form {
            background: #f0f4f8;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 13px;
        }

        .booking-form input, .booking-form select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
        }

        .booking-form button {
            width: 100%;
            padding: 10px;
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
        }

        .booking-form button:hover {
            background: #152a52;
        }

        .error {
            color: #d32f2f;
            font-size: 12px;
            margin-top: 5px;
        }

        .success {
            color: #388e3c;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SETUP SCREEN -->
        <div class="setup-screen" id="setupScreen">
            <h2>Horizon Roofing</h2>
            <p>Enter your Groq API key to get started</p>
            <form class="setup-form" onsubmit="startChat(event)">
                <input 
                    type="password" 
                    id="apiKeyInput" 
                    placeholder="Paste your Groq API key here"
                    required
                >
                <button type="submit">Start Chat</button>
                <div id="setupError"></div>
            </form>
        </div>

        <!-- CHAT SCREEN -->
        <div class="header" id="header">
            <h1>Horizon Roofing</h1>
            <p>Chat with us anytime • Instant answers & booking</p>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message bot">
                <div class="message-bubble">
                    Hi! 👋 I'm Horizon's roofing assistant. I can answer questions about our services, pricing, and help you book an estimate. What can I help with today?
                </div>
            </div>
        </div>

        <div class="input-area" id="inputArea">
            <input 
                type="text" 
                class="input-field" 
                id="userInput" 
                placeholder="Ask about services, pricing, or book an estimate..."
                autocomplete="off"
            >
            <button class="send-btn" id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        let GROQ_API_KEY = null;

        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const setupScreen = document.getElementById('setupScreen');
        const header = document.getElementById('header');
        const inputArea = document.getElementById('inputArea');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const setupError = document.getElementById('setupError');

        // Roofing context for the AI
        const roofingContext = `You are a helpful customer service chatbot for Horizon Roofing. You answer questions about roofing services, pricing, and help customers book appointments.

Services offered:
- Roof inspections ($150 standard, free with repair quote)
- Roof repairs (emergency available 24/7)
- Full roof replacement (custom quote based on square footage)
- Gutter services
- Storm damage assessments

Pricing guide:
- Inspection: $150
- Emergency repairs: $200 emergency fee + hourly rate ($85/hour)
- Full replacement: $8,000-$15,000 average (depends on roof size/materials)
- Consultations: Free phone consultations

Hours:
- Monday-Friday: 8am-6pm
- Saturday: 9am-2pm
- Emergencies: 24/7 available

When customers ask about booking, guide them to fill out a simple form with their name, phone, address, issue type, and preferred appointment date. Be friendly, professional, and helpful. Keep responses concise (2-3 sentences max in chat).`;

        function startChat(event) {
            event.preventDefault();
            const key = apiKeyInput.value.trim();
            
            if (!key) {
                setupError.innerHTML = '<div class="error">Please enter your API key</div>';
                return;
            }

            GROQ_API_KEY = key;
            setupError.innerHTML = '';

            // Hide setup, show chat
            setupScreen.style.display = 'none';
            header.classList.add('active');
            chatArea.classList.add('active');
            inputArea.classList.add('active');
            userInput.focus();
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            if (!GROQ_API_KEY) {
                showMessage("bot", "API key not set. Please refresh and enter your key.");
                return;
            }

            // Add user message to chat
            showMessage("user", message);
            userInput.value = "";

            // Show typing indicator
            const typingDiv = document.createElement("div");
            typingDiv.className = "message bot";
            typingDiv.innerHTML = '<div class="message-bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>';
            chatArea.appendChild(typingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: roofingContext },
                            { role: "user", content: message }
                        ],
                        max_tokens: 300,
                        temperature: 0.7
                    })
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        throw new Error("Invalid API key. Please refresh and try again.");
                    }
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();
                const botReply = data.choices[0].message.content;

                // Remove typing indicator
                typingDiv.remove();

                // Check if user is asking about booking
                if (message.toLowerCase().includes("book") || message.toLowerCase().includes("appointment") || message.toLowerCase().includes("estimate")) {
                    showMessage("bot", botReply);
                    showBookingForm();
                } else {
                    showMessage("bot", botReply);
                }

                chatArea.scrollTop = chatArea.scrollHeight;
            } catch (error) {
                typingDiv.remove();
                showMessage("bot", `Error: ${error.message}. Try again or call (555) 123-4567.`);
                console.error("API Error:", error);
            }
        }

        function showMessage(sender, text) {
            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${sender}`;
            const bubble = document.createElement("div");
            bubble.className = "message-bubble";
            bubble.textContent = text;
            messageDiv.appendChild(bubble);
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function showBookingForm() {
            const formDiv = document.createElement("div");
            formDiv.className = "message bot";
            formDiv.innerHTML = `
                <div class="message-bubble">
                    <div class="booking-form">
                        <strong>Quick Estimate Booking</strong>
                        <input type="text" id="bookName" placeholder="Your name" required>
                        <input type="tel" id="bookPhone" placeholder="Phone number" required>
                        <input type="text" id="bookAddress" placeholder="Property address" required>
                        <select id="bookIssue" required>
                            <option value="">Select issue type</option>
                            <option value="leak">Leak/Water damage</option>
                            <option value="inspection">General inspection</option>
                            <option value="replacement">Roof replacement</option>
                            <option value="repair">Repair needed</option>
                            <option value="emergency">Emergency repair</option>
                        </select>
                        <input type="date" id="bookDate" required>
                        <button onclick="submitBooking()">Book Estimate</button>
                        <div id="bookingStatus"></div>
                    </div>
                </div>
            `;
            chatArea.appendChild(formDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        window.submitBooking = function() {
            const name = document.getElementById("bookName").value.trim();
            const phone = document.getElementById("bookPhone").value.trim();
            const address = document.getElementById("bookAddress").value.trim();
            const issue = document.getElementById("bookIssue").value;
            const date = document.getElementById("bookDate").value;
            const statusDiv = document.getElementById("bookingStatus");

            if (!name || !phone || !address || !issue || !date) {
                statusDiv.innerHTML = '<div class="error">Please fill in all fields</div>';
                return;
            }

            // Log booking (in production, send to backend/email)
            console.log("Booking submitted:", { name, phone, address, issue, date });

            statusDiv.innerHTML = '<div class="success">✓ Booking received! We\'ll confirm within 1 hour.</div>';

            // Clear form after 2 seconds
            setTimeout(() => {
                document.getElementById("bookName").value = "";
                document.getElementById("bookPhone").value = "";
                document.getElementById("bookAddress").value = "";
                document.getElementById("bookIssue").value = "";
                document.getElementById("bookDate").value = "";
                statusDiv.innerHTML = "";
            }, 2000);

            showMessage("bot", "Perfect! Your estimate request is booked. We'll reach out to confirm the appointment within the next hour. Thank you for choosing Horizon Roofing!");
        };

        // Send message on Enter key
        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });

        sendBtn.addEventListener("click", sendMessage);
    </script>
</body>
</html>
